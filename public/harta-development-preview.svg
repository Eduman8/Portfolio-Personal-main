    <text x="204" y="184" fill="#FFF6EA" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="900" letter-spacing="-.8">#HARTA</text>
    <text x="836" y="181" fill="#D9B178" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800">Cart · Checkout · Admin</text>

