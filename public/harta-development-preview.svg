<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">#HARTA project in development preview</title>
  <desc id="desc">A cinematic ecommerce brand preview for #HARTA showing product cards, checkout elements and development status.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#120B14"/>
      <stop offset="0.5" stop-color="#211728"/>
      <stop offset="1" stop-color="#0B111D"/>
    </linearGradient>
    <linearGradient id="card" x1="168" y1="94" x2="1010" y2="646" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2D2035"/>
      <stop offset="1" stop-color="#111A28"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="180" y2="230" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFE2A8"/>
      <stop offset="0.5" stop-color="#D59B5B"/>
      <stop offset="1" stop-color="#7A452C"/>
    </linearGradient>
    <radialGradient id="spot" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(304 152) rotate(55) scale(469 379)">
      <stop stop-color="#E7B16F" stop-opacity="0.36"/>
      <stop offset="1" stop-color="#E7B16F" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="90" y="70" width="1020" height="662" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="34" stdDeviation="38" flood-color="#000000" flood-opacity="0.46"/>
    </filter>
  </defs>
  <rect width="1200" height="760" rx="44" fill="url(#bg)"/>
  <circle cx="300" cy="160" r="360" fill="url(#spot)"/>
  <circle cx="980" cy="628" r="280" fill="#8FB4FF" fill-opacity="0.1"/>
